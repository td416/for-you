<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ff4d6d; /* Soft romantic pink/red */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column; /* Stack text and heart vertically */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        #typing-container {
            font-size: 1.5rem;
            white-space: pre-wrap;
            max-width: 80%;
            border-right: 3px solid #ff4d6d;
            padding-right: 5px;
            animation: blink 0.7s infinite;
            margin-bottom: 20px;
        }

        /* The Heart Styles */
        #heart-container {
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            animation: fadeIn 2s ease-in; /* Smooth fade in */
        }

        .heart {
            background-color: #ff4d6d;
            display: inline-block;
            height: 50px;
            margin: 0 10px;
            position: relative;
            top: 0;
            transform: rotate(-45deg);
            width: 50px;
            animation: beat 0.8s infinite; /* Making it pulse */
        }

        .heart:before, .heart:after {
            content: "";
            background-color: #ff4d6d;
            border-radius: 50%;
            height: 50px;
            position: absolute;
            width: 50px;
        }

        .heart:before { top: -25px; left: 0; }
        .heart:after { left: 25px; top: 0; }

        .love-text {
            margin-top: 40px;
            font-size: 1.8rem;
            font-weight: bold;
        }

        @keyframes blink { 50% { border-color: transparent; } }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @keyframes beat {
            0% { transform: scale(1) rotate(-45deg); }
            50% { transform: scale(1.2) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
        }
    </style>
</head>
<body>

    <div id="typing-container"></div>

    <div id="heart-container">
        <div class="heart"></div>
        <div class="love-text">i love u babe</div>
    </div>

    <script>
        const message = "babe ik you seeing this massage and ik its not alot like i wanted to create more stuff for u but this is what i did tysm for being my girlfriend i love you so much babe ❤️";
        
        const container = document.getElementById('typing-container');
        const heartBox = document.getElementById('heart-container');
        let index = 0;

        function typeEffect() {
            if (index < message.length) {
                container.textContent += message.charAt(index);
                index++;
                setTimeout(typeEffect, 50); 
            } else {
                container.style.borderRight = "none";
                showHeart(); // Call the heart function when done
            }
        }

        function showHeart() {
            heartBox.style.display = "flex"; // Make heart visible
        }

        window.onload = typeEffect;
    </script>
</body>
</html>
